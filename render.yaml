# Render Blueprint — https://render.com/docs/blueprint-spec
# After first deploy: Dashboard → Environment → add secrets (same keys as .env.example)
version: "1"
services:
  - type: web
    name: gymbot-pro
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
